<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gia sư Socratic - AI Study Buddy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script>window.MathJax = { tex: { inlineMath: [['\\(', '\\)']] } };</script>
    <script async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
<body class="bg-slate-50 flex flex-col h-screen">
    <header class="bg-white border-b p-4 flex justify-between items-center shadow-sm">
        <a href="index.html" class="text-blue-600 font-bold flex items-center gap-2">
            <i class="fas fa-arrow-left"></i> Trang chủ
        </a>
        <h1 class="font-black text-slate-800">Gia sư Socratic</h1>
        <div class="w-10"></div>
    </header>

    <main id="chat-box" class="flex-1 overflow-y-auto p-4 space-y-4 max-w-2xl mx-auto w-full"></main>

    <footer class="p-4 bg-white border-t">
        <div class="max-w-2xl mx-auto flex gap-2">
            <input type="text" id="userInput" class="flex-1 bg-slate-100 rounded-full px-5 py-3 outline-none focus:ring-2 focus:ring-blue-400" placeholder="Hỏi kiến thức tại đây...">
            <button onclick="send()" class="bg-blue-600 text-white w-12 h-12 rounded-full flex items-center justify-center shadow-lg active:scale-90 transition-all">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </footer>

    <script>
        const chatBox = document.getElementById('chat-box');
        async function send() {
            const input = document.getElementById('userInput');
            const msg = input.value.trim();
            if(!msg) return;
            
            // Hiển thị tin nhắn user
            chatBox.innerHTML += `<div class="flex justify-end"><div class="bg-blue-600 text-white p-3 rounded-2xl rounded-tr-none max-w-[80%] shadow-md">${msg}</div></div>`;
            input.value = '';

            try {
                const res = await fetch("https://ai-backend-logic.onrender.com/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message: msg })
                });
                const data = await res.json();
                chatBox.innerHTML += `<div class="flex justify-start"><div class="bg-white border p-3 rounded-2xl rounded-tl-none max-w-[80%] shadow-sm text-slate-700">${data.reply}</div></div>`;
                chatBox.scrollTop = chatBox.scrollHeight;
                MathJax.typesetPromise();
            } catch (e) { console.error(e); }
        }
    </script>
</body>
</html>
