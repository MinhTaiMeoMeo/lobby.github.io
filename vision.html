<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quét Đề Bài - AI Study Buddy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-orange-50 flex flex-col h-screen">
    <header class="bg-orange-600 text-white p-4 flex justify-between items-center shadow-lg">
        <a href="index.html" class="font-bold flex items-center gap-2"><i class="fas fa-home"></i></a>
        <h1 class="font-bold uppercase tracking-widest text-sm">Vision Scanner</h1>
        <div class="w-4"></div>
    </header>

    <main class="flex-1 flex flex-col items-center justify-center p-6 text-center space-y-6">
        <div id="preview-container" class="hidden">
            <img id="imgPreview" class="max-h-64 rounded-2xl border-4 border-white shadow-2xl">
        </div>
        
        <div class="bg-white p-8 rounded-[40px] shadow-xl w-full max-w-sm space-y-4 border-b-8 border-orange-200">
            <div class="text-orange-500 text-5xl mb-4"><i class="fas fa-camera-retro"></i></div>
            <h2 class="text-xl font-black text-slate-800">Chụp ảnh bài tập</h2>
            <p class="text-slate-500 text-sm">AI sẽ giúp bạn phân tích đề bài từ hình ảnh chỉ trong vài giây.</p>
            
            <input type="file" id="fileInput" accept="image/*" class="hidden" onchange="handleFile()">
            <button onclick="document.getElementById('fileInput').click()" class="w-full bg-orange-500 text-white font-bold py-4 rounded-2xl hover:bg-orange-600 transition-all shadow-lg shadow-orange-200">
                CHỌN ẢNH NGAY
            </button>
        </div>
        
        <div id="status" class="text-orange-600 font-bold animate-pulse hidden">Đang phân tích ảnh...</div>
        <div id="result" class="bg-white p-4 rounded-2xl shadow-sm text-left w-full max-w-lg hidden text-slate-700 leading-relaxed"></div>
    </main>

    <script>
        let base64 = "";
        function handleFile() {
            const file = document.getElementById('fileInput').files[0];
            const reader = new FileReader();
            reader.onloadend = () => {
                base64 = reader.result;
                document.getElementById('imgPreview').src = base64;
                document.getElementById('preview-container').classList.remove('hidden');
                upload();
            };
            if(file) reader.readAsDataURL(file);
        }

        async function upload() {
            document.getElementById('status').classList.remove('hidden');
            try {
                const res = await fetch("https://ai-backend-logic.onrender.com/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ image: base64 })
                });
                const data = await res.json();
                document.getElementById('result').innerHTML = data.reply;
                document.getElementById('result').classList.remove('hidden');
            } catch (e) { alert("Lỗi kết nối!"); }
            document.getElementById('status').classList.add('hidden');
        }
    </script>
</body>
</html>
